name: CI

# Runs on every push and PR. Needs NO AWS credentials — everything here
# is testable on a clean checkout. deploy.yml handles anything AWS-touching.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app-tests:
    name: App tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic pytest httpx

      - name: Run app tests
        working-directory: app
        run: python -m pytest tests -q

  cost-audit-tests:
    name: Cost-audit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run cost-audit tests
        run: python -m pytest cost-audit/tests -q

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        working-directory: app
        run: docker build -t ecs-app:ci .
